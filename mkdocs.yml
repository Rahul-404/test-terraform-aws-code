plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy                # or numpy, auto, google, sphinx
            allow_inspection: true
            find_stubs_package: false
            heading_level: 3                      # starting header level
            parameter_headings: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            type_parameter_headings: false
            show_labels: false
            show_submodules: true
            extra:                                 # move all unrecognized/deprecated options here
              ignore_init_summary: true
              inheritance_diagram_direction: LR
              trim_doctest_flags: true

  - social:
      cards_layout_options:
        background_color: "#ff1493"

  - autorefs:
      link_titles: auto

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      default_lang: python

extra_javascript:
- https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js

