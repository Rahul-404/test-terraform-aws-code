site_name: Docs
site_url: https://rahul-404.github.io/test-terraform-aws-code/
site_description: >
  A scalable and automated ETL pipeline that extracts news data from BBC News,
  stores it in a NoSQL database, and provides real-time monitoring of the scraping process.

repo_url: https://github.com/Rahul-404/test-terraform-aws-code
repo_name: test-terraform-aws-code

theme:
  name: "material"
  icon:
    repo: fontawesome/brands/git-alt
    logo: fontawesome/solid/r
    favicons: assets/favicon.ico
  language: en
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - header.autohide
    - announce.dismiss
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest

  palette:

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: default
      primary: blue
      accent: deep orange
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode

